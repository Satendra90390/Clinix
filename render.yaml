services:
  - type: web
    name: clinixai
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: WORKERS
        value: 4
      - key: DB_PATH
        value: /data/clinixai.db
      - key: ALLOWED_ORIGINS
        value: "*"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
