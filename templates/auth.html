<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClinixAI - Sign In</title>
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <path d="M12 4V20M4 12H20M7 7L17 17M17 7L7 17" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1>ClinixAI</h1>
                <p>Your AI-Powered Health Guide</p>
            </div>

            <div class="auth-methods">
                <!-- Google Sign-In -->
                <button class="auth-btn google-btn" onclick="signInWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Phone Sign-In -->
                <div class="phone-auth">
                    <button class="auth-btn phone-btn" onclick="showPhoneInput()">
                        <span>📱</span> Continue with Phone
                    </button>
                    <div id="phoneInput" class="phone-input-group hidden">
                        <input type="tel" id="phoneNumber" placeholder="+1 (555) 000-0000" class="auth-input">
                        <button class="auth-btn send-otp-btn" onclick="sendOTP()">Send Code</button>
                        <div id="otpSection" class="hidden">
                            <input type="text" id="otpCode" placeholder="Enter 6-digit code" class="auth-input" maxlength="6">
                            <button class="auth-btn verify-btn" onclick="verifyOTP()">Verify</button>
                        </div>
                    </div>
                </div>

                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Email Sign-In -->
                <div class="email-auth">
                    <button class="auth-btn email-btn" onclick="showEmailInput()">
                        <span>✉️</span> Continue with Email
                    </button>
                    <div id="emailInput" class="email-input-group hidden">
                        <input type="email" id="emailAddress" placeholder="you@example.com" class="auth-input">
                        <button class="auth-btn send-link-btn" onclick="sendMagicLink()">Send Magic Link</button>
                    </div>
                </div>
            </div>

            <div class="auth-footer">
                <p class="disclaimer">By continuing, you agree to our Terms of Service and Privacy Policy</p>
                <p class="medical-disclaimer">⚠️ For educational purposes only. Not medical advice.</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="/static/auth.js"></script>
</body>
</html>
