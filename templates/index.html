<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinixAI - Medical Guidelines</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
                    <path d="M12 4V20M4 12H20"/>
                </svg>
            </div>
            <h1>ClinixAI</h1>
        </a>
        
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search conditions, medicines...">
        </div>
        
        <button class="btn-emergency" onclick="alert('Emergency protocols coming soon')">
            🚨 EMERGENCY
        </button>
    </header>

    <main class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-num" id="totalCount">0</div>
                <div class="stat-label">Guidelines</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="categoryCount">0</div>
                <div class="stat-label">Categories</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="criticalCount">0</div>
                <div class="stat-label">Critical/Urgent</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-category="">All</button>
            <button class="filter-btn" data-category="First Aid">First Aid</button>
            <button class="filter-btn" data-category="Emergency">Emergency</button>
            <button class="filter-btn" data-category="General">General</button>
        </div>

        <div class="cards-grid" id="guidelinesGrid"></div>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📭</div>
            <h3>No guidelines found</h3>
            <p>Try adjusting your search or filters</p>
        </div>
    </main>

    <div class="modal-overlay" id="detailOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <div class="card-badges" id="modalBadges"></div>
            </div>
            <div class="modal-body">
                <p id="modalSummary" style="margin-bottom: 1rem;"></p>
                <div id="modalMedicines"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
